{% extends 'admin/layout.html' %}

{% block title %}Edit Berita{% endblock %}
{% block page_title %}Sunting Berita{% endblock %}

{% block admin_content %}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3>Sunting Data Berita</h3>
        <a href="{{ url_for('manage_news') }}" style="color: var(--text-secondary); font-size: 0.9rem;">&larr; Kembali ke Daftar</a>
    </div>
    
    <form method="POST" class="admin-form">
        <div class="form-row">
            <div class="form-group">
                <label>Kategori</label>
                <select name="category" class="form-control" required>
                    <option value="Akademik" {% if item.category == 'Akademik' %}selected{% endif %}>Akademik</option>
                    <option value="Kegiatan" {% if item.category == 'Kegiatan' %}selected{% endif %}>Kegiatan</option>
                    <option value="Pengumuman" {% if item.category == 'Pengumuman' %}selected{% endif %}>Pengumuman</option>
                    <option value="Prestasi" {% if item.category == 'Prestasi' %}selected{% endif %}>Prestasi</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" name="date" class="form-control" value="{{ item.date }}" required>
            </div>
            <div class="form-group">
                <label>Link Gambar (URL)</label>
                <input type="text" name="image_url" class="form-control" value="{{ item.image_url }}" required>
            </div>
        </div>

        <div class="form-group" style="background: rgba(0, 119, 200, 0.03); padding: 1.5rem; border-radius: 15px; border: 1px dashed var(--accent-blue);">
            <div class="form-group">
                <label>Judul Berita</label>
                <input type="text" name="title" id="title_id" class="form-control" value="{{ item.title }}" required>
            </div>
            
            <div class="form-group">
                <label>Ringkasan (Excerpt)</label>
                <textarea name="excerpt" id="excerpt_id" class="form-control" rows="2" required>{{ item.excerpt }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Konten Berita</label>
                <textarea name="content" id="content_id" class="form-control" rows="10" required>{{ item.content }}</textarea>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1; height: 3.5rem; font-size: 1.1rem;">Simpan Perubahan</button>
            <a href="{{ url_for('manage_news') }}" class="btn btn-logout" style="text-align: center; line-height: 2.5; padding: 0 1.5rem; border-radius: 10px; background: #eee; color: #333; text-decoration: none;">Batalkan</a>
        </div>
    </form>
</div>
</div>
{% endblock %}
