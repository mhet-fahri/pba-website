{% extends 'admin/layout.html' %}

{% block title %}Edit Alumni{% endblock %}
{% block page_title %}Sunting Data Alumni{% endblock %}

{% block admin_content %}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3>Sunting Testimoni Alumni</h3>
        <a href="{{ url_for('manage_alumni') }}" style="color: var(--text-secondary); font-size: 0.9rem;">&larr; Kembali ke Daftar</a>
    </div>
    
    <form method="POST" class="admin-form">
        <div class="form-row">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
            </div>
            <div class="form-group">
                <label>Tahun Lulus</label>
                <input type="text" name="year" class="form-control" value="{{ item.year }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Pekerjaan/Posisi Saat Ini</label>
                <input type="text" name="position" class="form-control" value="{{ item.position }}" required>
            </div>
            <div class="form-group">
                <label>Username Instagram</label>
                <input type="text" name="instagram" class="form-control" value="{{ item.instagram }}" required>
            </div>
        </div>
        <div class="form-group">
            <label>Link Foto</label>
            <input type="text" name="image" class="form-control" value="{{ item.image }}" required>
        </div>
        <div class="form-group">
            <label>Kutipan (Quote)</label>
            <textarea name="quote" class="form-control" rows="3" required>{{ item.quote }}</textarea>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Simpan Perubahan</button>
            <a href="{{ url_for('manage_alumni') }}" class="btn btn-logout" style="text-align: center; line-height: 2.5;">Batalkan</a>
        </div>
    </form>
</div>
{% endblock %}
