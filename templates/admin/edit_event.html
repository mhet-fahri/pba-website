{% extends 'admin/layout.html' %}

{% block title %}Edit Kegiatan{% endblock %}
{% block page_title %}Sunting Kegiatan{% endblock %}

{% block admin_content %}
<div class="admin-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h3>Sunting Data Kegiatan</h3>
        <a href="{{ url_for('manage_events') }}" style="color: var(--text-secondary); font-size: 0.9rem;">&larr; Kembali ke Daftar</a>
    </div>
    
    <form method="POST" class="admin-form">
        <div class="form-group">
            <label>Judul Kegiatan</label>
            <input type="text" name="title" class="form-control" value="{{ item.title }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Tanggal (Hari)</label>
                <input type="text" name="day" class="form-control" value="{{ item.day }}" placeholder="Contoh: 25" required>
            </div>
            <div class="form-group">
                <label>Bulan</label>
                <input type="text" name="month" class="form-control" value="{{ item.month }}" placeholder="Contoh: Mei" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Waktu</label>
                <input type="text" name="time" class="form-control" value="{{ item.time }}" placeholder="09:00 - 12:00 WIB" required>
            </div>
            <div class="form-group">
                <label>Lokasi</label>
                <input type="text" name="location" class="form-control" value="{{ item.location }}" placeholder="Contoh: Aula Rektorat" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Link Gambar</label>
                <input type="text" name="image" class="form-control" value="{{ item.image }}" required>
            </div>
            <div class="form-group">
                <label>Jenis Kegiatan</label>
                <select name="type" class="form-control" required>
                    <option value="Akademik" {% if item.type == 'Akademik' %}selected{% endif %}>Akademik</option>
                    <option value="Kemahasiswaan" {% if item.type == 'Kemahasiswaan' %}selected{% endif %}>Kemahasiswaan</option>
                    <option value="Seminar" {% if item.type == 'Seminar' %}selected{% endif %}>Seminar</option>
                </select>
            </div>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Simpan Perubahan</button>
            <a href="{{ url_for('manage_events') }}" class="btn btn-logout" style="text-align: center; line-height: 2.5;">Batalkan</a>
        </div>
    </form>
</div>
{% endblock %}
